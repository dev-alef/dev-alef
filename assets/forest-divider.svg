    <circle cx="945" cy="55" r="1.3" opacity="0.5"/>
    <circle cx="1078" cy="32" r="1.6" opacity="0.8"/>
    <circle cx="1150" cy="50" r="1.2" opacity="0.6"/>
  </g>

