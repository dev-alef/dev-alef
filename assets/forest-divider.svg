<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" preserveAspectRatio="none" width="100%" height="140">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f12"/>
      <stop offset="100%" stop-color="#143d24"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="140" fill="url(#sky)"/>

  <!-- terminal horizon glow -->
  <rect x="0" y="122" width="1200" height="1.6" fill="#22c55e" opacity="0.55" filter="url(#glow)"/>

  <!-- data fireflies -->
  <g fill="#4ade80">
    <circle cx="62" cy="40" r="1.6" opacity="0.8"/>
    <circle cx="184" cy="58" r="1.2" opacity="0.6"/>
    <circle cx="305" cy="34" r="1.8" opacity="0.7"/>
    <circle cx="431" cy="52" r="1.3" opacity="0.5"/>
